name: Build ZMK firmware
on:
  push:
    paths-ignore:
      - 'config/corne_c.yaml'
      - 'config/corne_c.svg'
      - 'config/corne_c.json'
      - 'docs/**'
      - '*.md'
  pull_request:
  workflow_dispatch:

jobs:
  sync-keymap:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - name: Fetch keymap from zmk-config
        run: |
          curl -sL -H "Authorization: token ${{ secrets.PAT_ZMK_CONFIG }}" \
            -H "Accept: application/vnd.github.raw+json" \
            "https://api.github.com/repos/LyesHammadouche/zmk-config/contents/config/corne.keymap" \
            -o config/corne_c.keymap
      - name: Check if keymap changed
        id: check
        run: |
          git diff --quiet config/corne_c.keymap && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT
      - name: Commit synced keymap
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/corne_c.keymap
          git commit -m "auto: sync keymap from zmk-config"
          git push

  build:
    needs: sync-keymap
    if: always() && github.actor != 'github-actions[bot]'
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3.0
